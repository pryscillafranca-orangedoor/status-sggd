<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Report Poupatempo — Squad de IA</title>
<meta name="description" content="Status Report semanal — Squad de IA · Transformação de Jornadas Públicas · Poupatempo / Prodesp / OrangeDoor IT / Salesforce Partners">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#100a33; --ink-2:#1b1450;
  --indigo:#3a1f9e; --indigo-2:#5b3fd6; --indigo-soft:#ece8fb;
  --blue:#1798d6; --blue-soft:#bfe2f6; --blue-line:#7cc4ec;
  --purple:#3d1f97; --purple-soft:#cfc2f3;
  --lilac:#c9bdf0;
  --red:#d62740; --red-soft:#f6c9d0;
  --green:#13a06a; --green-soft:#bfe9d6;
  --amber:#f4b223; --orange:#f2731c;
  --paper:#ffffff; --bg:#eef2ff; --bg-2:#f7f1ff;
  --txt:#241d4a; --muted:#6d6796; --hair:#e6e3f5;
  --shadow:0 10px 30px -14px rgba(40,24,120,.32);
  --shadow-sm:0 4px 14px -8px rgba(40,24,120,.4);
  --r:16px;
  --lc:188px; /* gantt label column */
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; font-family:"Inter",system-ui,sans-serif; color:var(--txt);
  background:
    radial-gradient(1200px 600px at 85% -10%, #e7ecff 0%, transparent 60%),
    radial-gradient(900px 500px at 0% 0%, #f3eafe 0%, transparent 55%),
    linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:"Plus Jakarta Sans",sans-serif;margin:0;line-height:1.1}
a{color:inherit}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:50;
  backdrop-filter:saturate(140%) blur(10px);
  background:rgba(255,255,255,.78);
  border-bottom:1px solid var(--hair);
}
.topbar-inner{max-width:1240px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brandmark{display:flex;align-items:center;gap:10px;font-family:"Plus Jakarta Sans";font-weight:800;letter-spacing:-.02em;color:var(--indigo)}
.brandmark .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--indigo),var(--indigo-2));display:grid;place-items:center;color:#fff;font-size:14px}
.brand-meta{font:600 12px/1.3 "Inter";color:var(--muted)}
.partners{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.chip-brand{font:700 12px/1 "Plus Jakarta Sans";padding:6px 10px;border-radius:999px;border:1px solid var(--hair);background:#fff;color:var(--ink-2)}
.chip-brand .sq{display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--orange);margin-right:6px;vertical-align:middle}
.chip-sf{color:#0a93d4}

/* ---------- NAV ---------- */
nav.tabs{max-width:1240px;margin:0 auto;padding:10px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:thin}
nav.tabs button{
  white-space:nowrap;border:1px solid var(--hair);background:#fff;color:var(--muted);
  font:600 13px/1 "Inter";padding:9px 14px;border-radius:999px;cursor:pointer;transition:.18s;
  display:flex;align-items:center;gap:8px;
}
nav.tabs button:hover{color:var(--indigo);border-color:var(--purple-soft)}
nav.tabs button.active{background:linear-gradient(135deg,var(--indigo),var(--indigo-2));color:#fff;border-color:transparent;box-shadow:var(--shadow-sm)}
nav.tabs button .ledge{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.8}

/* ---------- LAYOUT ---------- */
.wrap{max-width:1240px;margin:0 auto;padding:26px 22px 80px}
.page{display:none;animation:fade .35s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- PROJECT HERO ---------- */
.phero{
  position:relative;overflow:hidden;border-radius:22px;color:#fff;padding:30px 30px 28px;margin-bottom:22px;
  background:
    radial-gradient(700px 240px at 80% -40%, rgba(120,180,255,.45) 0%, transparent 60%),
    radial-gradient(500px 260px at 10% 130%, rgba(150,90,255,.5) 0%, transparent 60%),
    linear-gradient(120deg,#160d4d 0%, #271263 55%, #3a1f9e 100%);
  box-shadow:var(--shadow);
}
.phero::after{content:"";position:absolute;inset:0;background:radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.5),transparent),radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.35),transparent),radial-gradient(1.5px 1.5px at 45% 70%, rgba(255,255,255,.3),transparent);opacity:.5;pointer-events:none}
.phero .eyebrow{font:700 12px/1 "Inter";letter-spacing:.18em;text-transform:uppercase;color:#b9c4ff;margin-bottom:10px}
.phero h2{font-size:clamp(26px,4vw,40px);font-weight:800;letter-spacing:-.02em}
.phero .sub{color:#cdd4ff;margin-top:8px;max-width:60ch;font-size:14px}
.phero .pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;position:relative;z-index:2}
.statuspill{display:inline-flex;align-items:center;gap:8px;font:800 12px/1 "Plus Jakarta Sans";letter-spacing:.04em;text-transform:uppercase;padding:9px 14px;border-radius:999px;color:#fff}
.statuspill .b{width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.25)}
.metapill{display:inline-flex;align-items:center;gap:8px;font:600 12px/1.3 "Inter";padding:9px 14px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#eef0ff}
.metapill b{color:#fff;font-weight:700}

/* ---------- SECTION SHELL ---------- */
.panel{background:var(--paper);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:22px}
.panel-h{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--hair)}
.panel-h .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;font-size:16px;background:linear-gradient(135deg,var(--indigo),var(--indigo-2))}
.panel-h h3{font-size:16px;font-weight:800;letter-spacing:-.01em}
.panel-h .h-note{margin-left:auto;font:600 12px/1 "Inter";color:var(--muted)}
.panel-b{padding:18px 20px}

/* ---------- GANTT ---------- */
.gantt{--cols:15;font-size:12px}
.gantt-scroll{overflow-x:auto;padding-bottom:6px}
.gantt-inner{min-width:880px}
.g-head{display:grid;grid-template-columns:var(--lc) 1fr;align-items:end;margin-bottom:6px}
.g-head .spacer{}
.g-weeks{display:grid;grid-template-columns:repeat(var(--cols),1fr)}
.g-week{text-align:center;padding:0 2px 8px;border-left:1px dashed var(--hair);color:var(--muted)}
.g-week:first-child{border-left:0}
.g-week b{display:block;font:700 11px/1.2 "Plus Jakarta Sans";color:var(--ink-2)}
.g-week span{font-size:10px}
.g-week.is-today b{color:var(--red)}
.g-row{display:grid;grid-template-columns:var(--lc) 1fr;align-items:center;min-height:34px}
.g-row + .g-row{margin-top:7px}
.g-label{font:600 12px/1.2 "Inter";color:var(--txt);padding-right:14px}
.g-track{position:relative;height:24px;border-radius:8px;background:
  repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/var(--cols) - 1px),var(--hair) calc(100%/var(--cols) - 1px),var(--hair) calc(100%/var(--cols)))}
.bar{position:absolute;top:3px;height:18px;border-radius:6px;display:flex;align-items:center}
.bar.done{background:linear-gradient(180deg,#74c2ec,var(--blue))}
.bar.blue{background:linear-gradient(180deg,#9ad3f1,#5fb6e6)}
.bar.active{background:linear-gradient(180deg,#5a39c9,var(--purple))}
.bar.dark{background:linear-gradient(180deg,#3a1f9e,#2a1374)}
.bar.late{background:linear-gradient(180deg,#e2596d,var(--red))}
.bar.plan{background:repeating-linear-gradient(45deg,var(--lilac),var(--lilac) 6px,#d8cef5 6px,#d8cef5 12px)}
.check{position:absolute;right:-18px;top:50%;transform:translateY(-50%);color:var(--green);font-weight:900;font-size:14px;text-shadow:0 1px 0 #fff}
.ms{position:absolute;top:50%;width:15px;height:15px;transform:translate(-50%,-50%) rotate(45deg);border-radius:3px;background:linear-gradient(135deg,#ffd766,var(--amber));box-shadow:0 1px 4px rgba(0,0,0,.18);z-index:3}
.ms.pin{background:var(--red);transform:translate(-50%,-50%);border-radius:50% 50% 50% 0;rotate:45deg;width:13px;height:13px}
.today{position:absolute;top:-26px;bottom:-7px;width:2px;background:linear-gradient(180deg,var(--red),rgba(214,39,64,.15));z-index:4}
.g-row:first-child .today::before{content:"HOJE 23/06";position:absolute;top:-14px;left:50%;transform:translateX(-50%);font:800 9px/1 "Plus Jakarta Sans";color:#fff;background:var(--red);padding:3px 6px;border-radius:5px;white-space:nowrap}
.g-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:18px;padding-top:14px;border-top:1px dashed var(--hair)}
.mscard{display:flex;align-items:center;gap:9px;font:500 12px/1.3 "Inter";color:var(--txt)}
.mscard .d{width:13px;height:13px;transform:rotate(45deg);border-radius:3px;background:linear-gradient(135deg,#ffd766,var(--amber));flex:none}
.mscard small{color:var(--muted);display:block;font-size:11px}
.swatches{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font:500 11px/1 "Inter";color:var(--muted)}
.swatches span{display:inline-flex;align-items:center;gap:6px}
.swatches i{width:18px;height:9px;border-radius:3px;display:inline-block}

/* ---------- INFOGRAPHIC GRID ---------- */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
@media(max-width:880px){.info-grid{grid-template-columns:1fr}}
.card{background:var(--paper);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;padding:13px 16px;color:#fff;font:800 13px/1 "Plus Jakarta Sans";letter-spacing:.02em;text-transform:uppercase}
.card-h .ci{font-size:15px}
.h-indigo{background:linear-gradient(110deg,var(--ink-2),var(--indigo))}
.h-blue{background:linear-gradient(110deg,#0e5fa6,var(--blue))}
.h-amber{background:linear-gradient(110deg,#c97a09,var(--orange))}
.h-red{background:linear-gradient(110deg,#9c1326,var(--red))}
.card-b{padding:14px 16px}
ul.lead{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px}
ul.lead li{position:relative;padding-left:18px;font:400 13.5px/1.45 "Inter";color:var(--txt)}
ul.lead li::before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:50%;background:var(--indigo-2)}
ul.lead.blue li::before{background:var(--blue)}
ul.lead.red li::before{background:var(--red)}
ul.lead.green li::before{background:var(--green)}
ul.lead li b{font-weight:700}

.timeline-list{display:flex;flex-direction:column;gap:10px}
.tl-item{display:flex;align-items:center;gap:12px}
.tl-item .tl-ic{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;color:#fff;font-size:13px;background:linear-gradient(135deg,var(--indigo),var(--indigo-2))}
.tl-item .tl-txt{font:500 13.5px/1.3 "Inter";flex:1}
.statetag{font:800 10.5px/1 "Plus Jakarta Sans";letter-spacing:.03em;text-transform:uppercase;padding:6px 9px;border-radius:7px;white-space:nowrap}
.s-done{background:var(--green-soft);color:#0b6e48}
.s-prog{background:#cfe9fa;color:#0c5e92}
.s-wait{background:#ffe2c4;color:#9a4e06}
.s-prev{background:var(--indigo-soft);color:var(--indigo)}
.s-plan{background:#e7e3f6;color:#5a5390}
.s-block{background:var(--red-soft);color:#9c1326}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{border:1px solid var(--hair);border-radius:12px;padding:14px;background:linear-gradient(180deg,#fff,#fafaff)}
.kpi .v{font:800 22px/1 "Plus Jakarta Sans";color:var(--indigo)}
.kpi .v.red{color:var(--red)} .kpi .v.green{color:var(--green)} .kpi .v.amber{color:var(--orange)} .kpi .v.blue{color:var(--blue)}
.kpi .l{font:600 11px/1.3 "Inter";color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.03em}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.two-col{grid-template-columns:1fr}}
.subhead{font:800 11px/1 "Plus Jakarta Sans";letter-spacing:.06em;text-transform:uppercase;color:var(--indigo);margin:2px 0 10px;display:flex;align-items:center;gap:7px}
.subhead.amber{color:var(--orange)} .subhead.green{color:var(--green)}

.deliv{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.deliv{grid-template-columns:1fr}}
.deliv .d-item .d-t{font:700 13.5px/1.2 "Plus Jakarta Sans";color:var(--ink-2);display:flex;gap:8px;align-items:center;margin-bottom:7px}
.deliv .d-item .d-t .di{color:var(--indigo-2)}
.deliv .d-item ul{margin:0;padding-left:16px;display:flex;flex-direction:column;gap:5px;font:400 12.5px/1.4 "Inter";color:var(--muted)}

.steps{counter-reset:s;display:flex;flex-direction:column;gap:9px}
.step{display:flex;gap:12px;align-items:flex-start;font:500 13.5px/1.4 "Inter"}
.step::before{counter-increment:s;content:counter(s);flex:none;width:24px;height:24px;border-radius:7px;background:var(--ink-2);color:#fff;font:800 12px/24px "Plus Jakarta Sans";text-align:center}

/* note / commitment */
.commit{margin-top:6px;border-radius:var(--r);padding:18px 22px;color:#fff;font:600 14px/1.5 "Inter";
  background:linear-gradient(110deg,var(--ink-2),var(--indigo) 70%, var(--indigo-2));box-shadow:var(--shadow-sm)}
.commit b{color:#ffd766}

/* ---------- OVERVIEW ---------- */
.ov-hero{border-radius:22px;padding:34px 30px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden;
  background:radial-gradient(700px 260px at 88% -30%,rgba(120,180,255,.4),transparent 60%),linear-gradient(120deg,#140c47,#2a1568 60%,#3a1f9e)}
.ov-hero .eyebrow{font:700 12px/1 "Inter";letter-spacing:.2em;text-transform:uppercase;color:#b9c4ff}
.ov-hero h1{font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:-.02em;margin:12px 0 6px}
.ov-hero p{color:#cdd4ff;max-width:65ch;font-size:14.5px}
.ov-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;margin-top:22px}
.ov-stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:14px}
.ov-stat .v{font:800 26px/1 "Plus Jakarta Sans"}
.ov-stat .l{font:600 11px/1.3 "Inter";color:#c4cbff;margin-top:6px;text-transform:uppercase;letter-spacing:.04em}

.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.pc{background:var(--paper);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:18px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:10px}
.pc:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--purple-soft)}
.pc .pc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pc .pc-n{font:800 16px/1.15 "Plus Jakarta Sans";color:var(--ink-2)}
.pc .pc-status{font:800 9.5px/1 "Plus Jakarta Sans";letter-spacing:.04em;text-transform:uppercase;padding:6px 8px;border-radius:7px;white-space:nowrap}
.pc .pc-meta{font:500 12.5px/1.45 "Inter";color:var(--muted)}
.pc .pc-go{font:700 12px/1 "Inter";color:var(--indigo);display:flex;align-items:center;gap:6px}
.pc .pc-bar{height:6px;border-radius:99px;background:var(--hair);overflow:hidden}
.pc .pc-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--indigo),var(--indigo-2))}

/* macro timeline */
.macro{overflow-x:auto}
.macro-inner{min-width:920px}
.macro-axis{display:grid;grid-template-columns:200px 1fr;align-items:end;margin-bottom:10px}
.macro-months{display:grid;position:relative}
.macro-months .m{text-align:center;font:700 11px/1.2 "Plus Jakarta Sans";color:var(--ink-2);padding-bottom:8px;border-left:1px dashed var(--hair)}
.macro-row{display:grid;grid-template-columns:200px 1fr;align-items:center;min-height:30px}
.macro-row + .macro-row{margin-top:8px}
.macro-row .ml{font:600 12.5px/1.2 "Inter"}
.macro-track{position:relative;height:22px}
.macro-bar{position:absolute;top:4px;height:14px;border-radius:7px;background:linear-gradient(180deg,#5a39c9,var(--purple))}
.macro-bar.soft{background:repeating-linear-gradient(45deg,var(--lilac),var(--lilac) 6px,#dad0f6 6px,#dad0f6 12px)}
.macro-bar.blue{background:linear-gradient(180deg,#9ad3f1,#5fb6e6)}
.macro-ms{position:absolute;top:50%;width:14px;height:14px;transform:translate(-50%,-50%) rotate(45deg);border-radius:3px;background:linear-gradient(135deg,#ffd766,var(--amber));z-index:3;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.macro-today{position:absolute;top:-24px;bottom:0;width:0;border-left:2px dashed var(--red);z-index:4}
.macro-row:first-child .macro-today::before{content:"HOJE";position:absolute;top:-12px;left:50%;transform:translateX(-50%);font:800 9px/1 "Plus Jakarta Sans";color:#fff;background:var(--red);padding:3px 6px;border-radius:5px}
.macro-golives{display:grid;grid-template-columns:200px 1fr;margin-top:6px}
.macro-gl{position:relative;height:46px}
.macro-gl .gl{position:absolute;transform:translateX(-50%);text-align:center;font:700 10.5px/1.25 "Inter";color:var(--indigo);width:92px}

/* footer */
.foot{max-width:1240px;margin:30px auto 0;padding:22px;color:var(--muted);font:500 12px/1.6 "Inter";border-top:1px solid var(--hair);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

@media(max-width:680px){
  :root{--lc:120px}
  .wrap{padding:18px 14px 70px}
  .phero{padding:24px 20px}
  .panel-b{padding:14px}
}
/* print */
@media print{
  .topbar,nav.tabs,.pc .pc-go{display:none!important}
  .page{display:block!important;page-break-after:always}
  body{background:#fff}
  .panel,.card,.pc{box-shadow:none}
}
</style>
</head>

      ]

  projects:[
    /* ============ BUSCADOR ============ */

/* ============ RENDER HELPERS ============ */
const pct = (n,cols)=> (n/cols*100);
const esc = s=>s;

function ganttHTML(g){
  const cols=g.cols;
  let weeks = g.weeks.map((w,i)=>{
    const [s,d]=w.split(" ");
    return `<div class="g-week${i===g.today?' is-today':''}"><b>${s}</b><span>${d||''}</span></div>`;
  }).join("");

  let rows = g.rows.map(r=>{
    let bars=(r.bars||[]).map(b=>{
      const left=pct(b.s,cols), width=pct(b.e-b.s,cols);
      return `<div class="bar ${b.c}" style="left:${left}%;width:${width}%">${b.check?'<span class="check">✓</span>':''}</div>`;
    }).join("");
    let ms=(r.ms||[]).map(m=>`<span class="ms" style="left:${pct(m.w+0.5,cols)}%"></span>`).join("");
    let pin = (r.pin!=null)?`<span class="ms pin" style="left:${pct(r.pin+0.5,cols)}%"></span>`:'';
    let today=`<span class="today" style="left:${pct(g.today+0.5,cols)}%"></span>`;
    return `<div class="g-row"><div class="g-label">${r.l}</div><div class="g-track">${bars}${ms}${pin}${today}</div></div>`;
  }).join("");

  let legend = g.milestones.map(m=>{
    const wk=g.weeks[m.w]?g.weeks[m.w].split(" ")[0]:'';
    return `<div class="mscard"><span class="d"></span><div>${m.t}<small>${wk}</small></div></div>`;
  }).join("");

  return `
  <div class="panel">
    <div class="panel-h"><span class="ic">📊</span><h3>Cronograma por semanas (Gantt)</h3><span class="h-note">Marco ◆ · Hoje ${TODAY}</span></div>
    <div class="panel-b">
      <div class="gantt" style="--cols:${cols}">
        <div class="gantt-scroll"><div class="gantt-inner">
          <div class="g-head"><div class="spacer"></div><div class="g-weeks">${weeks}</div></div>
          ${rows}
        </div></div>
        <div class="swatches">
          <span><i style="background:linear-gradient(180deg,#74c2ec,var(--blue))"></i>Concluído</span>
          <span><i style="background:linear-gradient(180deg,#5a39c9,var(--purple))"></i>Em execução</span>
          <span><i style="background:linear-gradient(180deg,#e2596d,var(--red))"></i>Replanejado</span>
          <span><i style="background:repeating-linear-gradient(45deg,var(--lilac),var(--lilac) 5px,#d8cef5 5px,#d8cef5 10px)"></i>Planejado</span>
          <span><i style="background:var(--amber);transform:rotate(45deg);width:11px;height:11px"></i>Marco</span>
        </div>
        <div class="g-legend">${legend}</div>
      </div>
    </div>
  </div>`;
}

function leadList(arr,cls=""){return `<ul class="lead ${cls}">${arr.map(x=>`<li>${x}</li>`).join("")}</ul>`;}
function cronoList(arr){return `<div class="timeline-list">${arr.map(c=>`<div class="tl-item"><span class="tl-ic">●</span><div class="tl-txt">${c.t}</div><span class="statetag ${c.cls}">${c.s}</span></div>`).join("")}</div>`;}
function delivGrid(arr){return `<div class="deliv">${arr.map(d=>`<div class="d-item"><div class="d-t"><span class="di">★</span>${d.t}</div><ul>${d.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>`).join("")}</div>`;}
function kpiRow(arr){return `<div class="kpis">${arr.map(k=>`<div class="kpi"><div class="v ${k.c||''}">${k.v}</div><div class="l">${k.l}</div></div>`).join("")}</div>`;}
function steps(arr){return `<div class="steps">${arr.map(s=>`<div class="step">${s}</div>`).join("")}</div>`;}

function infoCards(p){

  <div class="info-grid">
    <div class="card">
      <div class="card-h h-indigo"><span class="ci">📋</span>Status atual</div>
      <div class="card-b">${leadList(p.statusAtual)}</div>
    </div>
    <div class="card">
      <div class="card-h h-blue"><span class="ci">🗓️</span>Cronograma e marcos</div>
      <div class="card-b">${cronoList(p.cronograma)}</div>
    </div>
    <div class="card" style="grid-column:1/-1">
      <div class="card-h h-indigo"><span class="ci">⭐</span>Principais entregas e evoluções</div>
      <div class="card-b">${delivGrid(p.entregas)}</div>

    <div class="card">

        <div class="two-col">
          <div><div class="subhead">Riscos</div>${leadList(p.riscos,'red')}</div>
          <div><div class="subhead green">Mitigação</div>${leadList(p.mitigacao,'green')}</div>

      </div>
    </div>

}

function twinCards(p){

    <div class="card">
      <div class="card-h h-indigo"><span class="ci">🤖</span>${t.name}
        <span class="statetag ${t.cls}" style="margin-left:auto">${t.status}</span></div>
      <div class="card-b">
        <div class="metapill" style="background:var(--indigo-soft);color:var(--indigo);border:none;margin-bottom:12px"><b>Meta:</b> ${t.meta}</div>

        <div class="subhead" style="margin-top:16px">Cronograma e marcos</div>${cronoList(t.cronograma)}
        <div class="two-col" style="margin-top:16px">

          <div><div class="subhead green">Mitigação</div>${leadList(t.mitigacao,'green')}</div>
        </div>

    </div>`;
  return `<div class="info-grid">${block(p.twinA)}${block(p.twinB)}</div>`;

function projectPage(p){
  return `

/* ----- overview / macro ----- */
function macroHTML(m){
  const months=m.months.map(x=>`<div class="m">${x}</div>`).join("");
  const colW=`grid-template-columns:repeat(${m.months.length},1fr)`;
  const rows=m.rows.map(r=>{
    const bars=r.bars.map(b=>`<div class="macro-bar ${b.c||''}" style="left:${b.s}%;width:${b.e-b.s}%"></div>`).join("");
    const ms=(r.ms||[]).map(x=>`<div class="macro-ms" style="left:${x.p}%"></div>${x.t?`<div style="position:absolute;left:${x.p}%;top:-16px;transform:translateX(-50%);font:800 9px/1 'Plus Jakarta Sans';color:var(--indigo)">${x.t}</div>`:''}`).join("");
    return `<div class="macro-row"><div class="ml">${r.l}</div><div class="macro-track">${bars}${ms}<div class="macro-today" style="left:${m.todayPct}%"></div></div></div>`;
  }).join("");
  const gl=m.golives.map(g=>{
    const tx = g.p>=95 ? '-82%' : (g.p<=5 ? '-18%' : '-50%');
    return `<div class="gl" style="left:${g.p}%;transform:translateX(${tx})">◆ ${g.t}</div>`;
  }).join("");
  return `
  <div class="panel macro">
    <div class="panel-h"><span class="ic">🗺️</span><h3>Macro plano de Go-Live</h3><span class="h-note">Marco ◆ · linha tracejada = hoje</span></div>
    <div class="panel-b"><div class="macro-inner">
      <div class="macro-axis"><div></div><div class="macro-months" style="${colW}">${months}</div></div>
      ${rows}
      <div class="macro-golives"><div></div><div class="macro-gl">${gl}</div></div>
    </div></div>
  </div>`;
}

      <div class="pc-top"><div class="pc-n">${p.name}</div>

      <div class="pc-bar"><i style="width:${p.progress}%"></i></div>
      <div class="pc-go">Abrir página →</div>

  return `

    <div class="panel" style="background:transparent;border:none;box-shadow:none;margin-bottom:14px">
      <div class="panel-h" style="padding-left:0;border:none"><span class="ic">🧭</span><h3>Frentes em acompanhamento</h3></div>
    </div>

}

tabsEl.innerHTML=tabs.map(t=>`<button data-tab="${t.id}"><span class="ledge"></span>${t.tab}</button>`).join("");

function show(id){
  document.querySelectorAll(".page").forEach(s=>s.classList.toggle("active", s.dataset.page===id));
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  window.scrollTo({top:0,behavior:"instant"in window?"instant":"auto"});
  if(location.hash.slice(1)!==id) history.replaceState(null,"","#"+id);
}
tabsEl.addEventListener("click",e=>{const b=e.target.closest("button");if(b)show(b.dataset.tab);});
app.addEventListener("click",e=>{const c=e.target.closest("[data-goto]");if(c)show(c.dataset.goto);});

const init=location.hash.slice(1);
show(tabs.some(t=>t.id===init)?init:"overview");
